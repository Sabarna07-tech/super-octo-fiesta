name: Super Octo Fiesta CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push events for all branches
  push:
    branches: ["**"]
  # Triggers the workflow on pull request events targeted at the main branch
  pull_request:
    branches: ["main", "master"]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # Job to lint the Python backend
  lint-backend:
    name: Lint Backend (Python)
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the repository code
      - name: Check out code
        uses: actions/checkout@v4

      # 2. Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install dependencies from requirements.txt
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # 4. Run the flake8 linter
      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # Job to test the JavaScript frontend
  test-frontend:
    name: Test Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      # 1. Check out the repository code
      - name: Check out code
        uses: actions/checkout@v4

      # 2. Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # 3. Install npm dependencies
      - name: Install npm dependencies
        run: npm install

      # 4. Run the linter (defined in package.json)
      - name: Lint with ESLint
        run: npm run lint -- --no-fix

      # 5. Run the build command to ensure the app compiles
      - name: Build with Vite
        run: npm run build
