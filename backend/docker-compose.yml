version: '3.8'

services:
  backend:
    build:
      context: .
      # EDITED: Point the backend to use the same robust Dockerfile as the worker
      dockerfile: worker.Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    command: gunicorn --bind 0.0.0.0:5000 app:app
    depends_on:
      - redis

  worker:
    build:
      context: .
      # This already correctly points to the worker.Dockerfile
      dockerfile: worker.Dockerfile
    volumes:
      - .:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      
  redis:
    image: "redis:7-alpine"
    ports:
      - "6379:6379"