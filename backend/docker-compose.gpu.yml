version: '3.8'

services:
  gpu_worker:
    build: .
    container_name: gpu_worker_service
    # This worker ONLY consumes from the 'gpu_queue'
    command: ["celery", "-A", "services.celery_worker.celery", "worker", "-Q", "gpu_queue", "--loglevel=info"]
    volumes:
      - .:/app
    env_file: .env
    environment:
      # MODIFIED: Use host.docker.internal to connect to Redis
      # running on the host machine via docker-compose.app.yml
      - REDIS_HOST=host.docker.internal
    # Uncomment the section below if you have an NVIDIA GPU and NVIDIA Container Toolkit installed
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

